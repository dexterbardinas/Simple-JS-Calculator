<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <style>
            body { 
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background-color: hsl(0,0%,95%);
            }
            
            .calculator { 
                display: block;
                padding: 15px;
                font-family: Arial, sans-serif;
                background-color: hsl(0,0%,15%);
                border-radius: 25px;
                width: 90%;
                max-width: 350px;
                overflow: hidden;
            }

            .display { 
                height: 80px;
                box-sizing: border-box;
                width: 100%;
                padding: 10px 20px; 
                border: none;
                text-align: right;
                font-size: 3rem;
                color: white;
                background-color: transparent; 
            }
            
            .keys { 
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
                padding: 10px;
            }
            
            button { 
                aspect-ratio: 1/1;
                border-radius: 50%;
                border: none;
                background-color: hsl(0,0%,25%);
                color: white;
                font-size: 1.5rem;
                font-weight: bold;
                cursor: pointer;
            }

            button:active { background-color: hsl(0,0%,40%); } 
            
            .operator-btn { background-color: hsl(35, 100%, 55%); }
        </style>
    </head>
    <body>
        
        <div class="calculator">
            <input id="display" class="display" readonly placeholder="0">
            <div class="keys">
                <button onclick="clearDisplay()">C</button>
                <button class="operator-btn" onclick="appendToDisplay('/')">/</button>
                <button class="operator-btn" onclick="appendToDisplay('*')">×</button>
                <button class="operator-btn" onclick="appendToDisplay('-')">-</button>
                
                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button class="operator-btn" onclick="appendToDisplay('+')">+</button>
                
                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button class="operator-btn" onclick="calculate()">=</button>
                
                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('0')">0</button>
            </div>
        </div>

        <script>
            const display = document.getElementById('display');

            function appendToDisplay(input) {
                display.value += input;
            }

            function clearDisplay() {
                display.value = "";
            }

            function calculate() {
                try {
                    display.value = eval(display.value);
                } catch (error) {
                    display.value = "Error";
                }
            }
        </script>
    </body>
</html>
